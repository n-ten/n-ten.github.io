    <style>
        /* COLOR PALETTE & THEMES */
        :root {
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --input-bg: #f8fafc;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --text-dark: #1e293b;
            --text-gray: #64748b;
            --border: #cbd5e1;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --nav-bg: rgba(255, 255, 255, 0.95);
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --input-bg: #0f172a;
            --text-dark: #f8fafc;
            --text-gray: #94a3b8;
            --border: #334155;
            --nav-bg: rgba(30, 41, 59, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

        body { background: var(--bg); color: var(--text-dark); padding-top: 80px; padding-bottom: 100px; display: flex; flex-direction: column; align-items: center; transition: background 0.3s, color 0.3s; }

        /* NAVBAR */
        .navbar {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background: var(--nav-bg); backdrop-filter: blur(5px);
            border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 100;
            transition: background 0.3s, border-color 0.3s;
        }
        .nav-right { display: flex; gap: 15px; }
        .nav-icon { background: none; border: none; font-size: 22px; color: var(--text-gray); cursor: pointer; transition: color 0.2s; }
        .nav-icon:hover { color: var(--primary); }

        /* CONTAINER */
        .container { width: 100%; max-width: 500px; padding: 0 15px; }

        /* GENERATOR BAR (VERTIKAL) */
        .generator-card { background: var(--card-bg); border-radius: 12px; padding: 20px; margin-bottom: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); border: 1px solid var(--border); transition: background 0.3s, border-color 0.3s; }
        .generator-bar { display: flex; flex-direction: column; gap: 12px; }
        
        .gen-input { 
            width: 100%; height: 50px; border: 2px solid var(--border); border-radius: 10px; padding: 0 15px; 
            font-size: 0.9em; font-weight: 500; background: var(--input-bg); color: var(--text-dark); outline: none; transition: all 0.2s;
        }
        .gen-input:focus { border-color: var(--primary); }
        
        .gen-btn { 
            width: 100%; height: 50px; background: var(--primary); color: white; border: none; border-radius: 10px;
            font-size: 1.05em; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.2s;
        }
        .gen-btn:hover { background: var(--primary-hover); }

        /* CARD LIST */
        .card-list { display: flex; flex-direction: column; gap: 14px; }
        .link-card {
            display: flex; background: var(--card-bg); border-radius: 12px; overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02); min-height: 74px; transition: background 0.3s, border-color 0.3s;
        }

        /* Copy Button (Kiri Penuh) */
        .copy-zone {
            width: 60px; display: flex; justify-content: center; align-items: center; cursor: pointer; 
            font-size: 20px; flex-shrink: 0; align-self: stretch; border: none; outline: none;
        }
        
        /* Konten Kanan */
        .content-zone { flex: 1; padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; overflow: hidden; cursor: pointer;}
        .text-info { display: flex; flex-direction: column; justify-content: center; overflow: hidden; height: 100%; }
        .card-title { font-weight: 700; font-size: 0.95em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: uppercase; letter-spacing: 0.5px;}
        .card-subtitle { font-size: 0.75em; color: var(--text-gray); margin-top: 6px; display: flex; gap: 8px; align-items: center; }
        
        .badge { padding: 3px 8px; border-radius: 6px; font-weight: 700; font-size: 0.85em; }
        .badge-price { background: rgba(37, 99, 235, 0.15); color: var(--primary); }
        .badge-status { background: rgba(245, 158, 11, 0.15); color: var(--warning); }

        /* Admin Buttons (Lebih Rapi & Jelas) */
        .admin-actions { display: none; gap: 8px; margin-left: 10px; align-items: center; }
        .btn-act { 
            width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); 
            cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 13px; 
            background: var(--card-bg); color: var(--text-gray); transition: border-color 0.2s;
        }
        .btn-act:hover { border-color: var(--primary); color: var(--primary); }
        .btn-pin.active { background: rgba(245, 158, 11, 0.15); color: var(--warning); border-color: var(--warning); }
        .btn-del:hover { border-color: var(--danger); color: var(--danger); background: rgba(239, 68, 68, 0.1); }

        /* FLOATING BUTTON */
        .fab {
            position: fixed; bottom: 30px; right: 30px; width: 56px; height: 56px; background: var(--text-dark); color: white;
            border-radius: 50%; border: none; font-size: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer; display: none; justify-content: center; align-items: center; z-index: 99;
        }

        /* MODALS FORM */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(2px); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; opacity: 0; transition: opacity 0.2s; }
        .modal.active { display: flex; opacity: 1; }
        .modal-box { background: var(--card-bg); width: 100%; max-width: 380px; border-radius: 16px; padding: 24px; box-shadow: 0 15px 30px rgba(0,0,0,0.2); transform: translateY(20px); transition: transform 0.2s, background 0.3s; }
        .modal.active .modal-box { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-weight: 800; font-size: 1.1em; color: var(--text-dark);}
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85em; font-weight: 600; color: var(--text-gray); margin-bottom: 6px; }
        .form-input { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 8px; outline: none; font-family: inherit; font-size: 0.95em; transition: border-color 0.2s; background: var(--input-bg); color: var(--text-dark); }
        .form-input:focus { border-color: var(--primary); }
        
        .check-wrap { display: flex; align-items: center; gap: 8px; font-size: 0.85em; font-weight: 600; color: var(--text-gray); cursor: pointer; margin-bottom: 20px; }
        .btn-submit { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 1em; transition: background 0.2s;}
        .btn-submit:hover { background: var(--primary-hover); }

        /* CUSTOM ALERT */
        .alert-icon { font-size: 45px; margin-bottom: 15px; }
        .alert-text { color: var(--text-gray); font-size: 0.95em; margin-bottom: 25px; line-height: 1.5; font-weight: 500;}
        .alert-btns { display: flex; gap: 10px; justify-content: center; }
        .btn-alert { flex: 1; padding: 12px; border-radius: 8px; font-weight: 700; border: none; cursor: pointer; transition: 0.2s;}
        .btn-cancel { background: var(--input-bg); color: var(--text-dark); border: 1px solid var(--border); }
        .btn-confirm { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; }
    </style>
</head>

    <script>
        // ==========================================
        // THEME TOGGLE (DARK/LIGHT MODE)
        // ==========================================
        function toggleTheme() {
            const body = document.documentElement;
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            setThemeIcon(newTheme);
        }

        function setThemeIcon(theme) {
            const icon = document.getElementById('theme-toggle');
            icon.innerHTML = theme === 'dark' ? '<i class="fa-solid fa-sun" style="color:#f59e0b;"></i>' : '<i class="fa-solid fa-moon"></i>';
        }

        window.addEventListener('DOMContentLoaded', () => { setThemeIcon(savedTheme); });

        // ==========================================
        // STATE & INITIALIZATION
        // ==========================================
        let dbShopee = {};
        let dbWilayah = [];
        let dbNames = [];
        let isAdmin = false;
        const colors = ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4'];
        const todayWIB = new Date().toLocaleDateString('en-CA', {timeZone: 'Asia/Jakarta'});

        function toTitleCase(str) {
            if (!str) return "";
            return str.toLowerCase().replace(/(?:^|\s|-)\w/g, match => match.toUpperCase());
        }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        // ==========================================
        // OTENTIKASI & REALTIME DATABASE
        // ==========================================
        auth.onAuthStateChanged(user => {
            isAdmin = !!user;
            document.getElementById('btn-login-trigger').style.display = isAdmin ? 'none' : 'block';
            document.getElementById('btn-logout-trigger').style.display = isAdmin ? 'block' : 'none';
            document.getElementById('fab').style.display = isAdmin ? 'flex' : 'none';
            renderCards(); 
        });

        db.ref('linkshopee').on('value', snap => { 
            dbShopee = snap.val() || {}; 
            renderCards(); 
        });

        const TWELVE_HOURS = 12 * 60 * 60 * 1000;
        db.ref('used_names').on('value', snap => {
            dbNames = [];
            const now = Date.now();
            let updates = {};
            let needsCleanup = false;

            if(snap.exists()) {
                snap.forEach(child => {
                    const data = child.val();
                    if (now - data.timestamp > TWELVE_HOURS) {
                        updates[child.key] = null;
                        needsCleanup = true;
                    } else {
                        dbNames.push(data.name);
                    }
                });
                if(needsCleanup) db.ref('used_names').update(updates);
            }
        });

        // BONGKAR JSON WILAYAH DARI GITHUB
        fetch(CONFIG.JSON_URL).then(r => {
            if (!r.ok) throw new Error("JSON tidak ditemukan"); return r.json();
        }).then(data => {
            let flatData = [];
            for (const prov in data) {
                if (prov.toUpperCase().includes("PAPUA")) continue; 
                for (const kota in data[prov]) {
                    for (const kec in data[prov][kota]) {
                        for (const desa in data[prov][kota][kec]) {
                            flatData.push({ provinsi: prov, kota: kota, kecamatan: kec, desa: desa, kodepos: data[prov][kota][kec][desa] });
                        }
                    }
                }
            }
            dbWilayah = flatData;
        }).catch(e => {
            console.error("Gagal memuat kota.json:", e);
            dbWilayah = [{ provinsi: "Jawa Timur", kota: "Surabaya", kecamatan: "Krembangan", desa: "Kemayoran", kodepos: "60111" }];
        });

        // ==========================================
        // FUNGSI ADMIN LOGIN/LOGOUT
        // ==========================================
        function login() {
            const e = document.getElementById('log-email').value;
            const p = document.getElementById('log-pass').value;
            const r = document.getElementById('log-remember').checked;
            if(!e || !p) return customAlert("Input Kosong", "Silakan isi email dan password.", "danger");
            
            auth.setPersistence(r ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION)
                .then(() => auth.signInWithEmailAndPassword(e, p).then(() => { 
                    closeModal('modal-login'); document.getElementById('log-pass').value=''; 
                }))
                .catch(err => customAlert("Login Gagal", "Email atau Password Salah", "danger"));
        }

        async function logout() { 
            const confirm = await customAlert("Logout", "Keluar dari mode Admin?", "confirm");
            if(confirm) auth.signOut(); 
        }

        // ==========================================
        // GENERATOR DATA ACAK
        // ==========================================
        function generateData() {
            if(dbWilayah.length === 0) return customAlert("Tunggu", "Database wilayah sedang dimuat...", "info");
            
            let namaRaw = "Budi Santoso";
            if (typeof window.faker !== 'undefined') {
                window.faker.locale = "id_ID";
                let loop = 0;
                do { 
                    namaRaw = window.faker.name.firstName() + " " + window.faker.name.lastName(); 
                    loop++; 
                } while(dbNames.includes(namaRaw) && loop < 50);
            }
            
            db.ref('used_names').push({ name: namaRaw, timestamp: Date.now() });

            const prx = CONFIG.HP_PREFIX[Math.floor(Math.random() * CONFIG.HP_PREFIX.length)];
            const hp = prx + Math.floor(Math.random() * 100000000).toString().padStart(8, '0');

            let wTarget = [];
            if(Math.random() < 0.30) {
                wTarget = dbWilayah.filter(w => CONFIG.BIG_CITIES.some(kb => (w.kota||"").toUpperCase().includes(kb)));
                if(wTarget.length === 0) wTarget = dbWilayah;
            } else {
                wTarget = dbWilayah.filter(w => !CONFIG.BIG_CITIES.some(kb => (w.kota||"").toUpperCase().includes(kb)));
                if(wTarget.length === 0) wTarget = dbWilayah;
            }
            const dataW = wTarget[Math.floor(Math.random() * wTarget.length)];

            let jalanRaw = "";
            if(Math.random() < 0.5) {
                const hero = CONFIG.HEROES[Math.floor(Math.random() * CONFIG.HEROES.length)];
                jalanRaw = `Jl. ${hero} No. ${Math.floor(Math.random()*150)+1}`;
            } else {
                jalanRaw = dataW.jalan ? dataW.jalan : `Desa ${dataW.desa || dataW.kecamatan}`;
            }

            const nama = toTitleCase(namaRaw);
            const prov = toTitleCase(dataW.provinsi || "");
            const kota = toTitleCase(dataW.kota || "").replace(/,\s*Kabupaten/gi, "").replace(/Kota Adm\.\s*/gi, "").replace(/Kota\s+/gi, "").replace(/Kabupaten\s+/gi, "Kab. ");
            const kec = toTitleCase(dataW.kecamatan || "");
            const jalan = toTitleCase(jalanRaw).replace(/Jl\./gi, "Jl.").replace(/No\./gi, "No."); 

            const hasil = `${nama}, ${hp}, ${prov}, ${kota}, ${dataW.kodepos || "60111"}, ${jalan}, Kec. ${kec}`;
            
            const out = document.getElementById('output-data');
            out.value = hasil;
            navigator.clipboard.writeText(hasil).catch(() => {});
            
            const btn = document.getElementById('btn-generate');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Acak Data';
            setTimeout(() => { btn.innerHTML = originalHtml; }, 1000);
        }

        // ==========================================
        // RENDER UI KARTU
        // ==========================================
        function renderCards() {
            const container = document.getElementById('cards-container');
            container.innerHTML = "";

            const randomCard = dbShopee['ID_RANDOM_LOCKED'];
            let regs = Object.keys(dbShopee).filter(k => k !== 'ID_RANDOM_LOCKED').map(k => ({ key: k, ...dbShopee[k] }));
            
            regs.sort((a, b) => {
                if(a.pinnedAt && !b.pinnedAt) return -1;
                if(!a.pinnedAt && b.pinnedAt) return 1;
                if(a.pinnedAt && b.pinnedAt) return b.pinnedAt - a.pinnedAt;
                return (b.updatedAt || b.createdAt) - (a.updatedAt || a.createdAt);
            });

            // KARTU ACAK
            if (randomCard || isAdmin) {
                const el = document.createElement('div');
                const accent = 'var(--primary)'; 
                el.className = 'link-card';
                el.style.border = `2px solid ${accent}`;

                if(randomCard) {
                    const title = randomCard.title ? randomCard.title.toUpperCase() : "LINK ACAK";
                    el.innerHTML = `
                        <button class="copy-zone" style="background: ${accent}; color: white; border-right: 2px solid ${accent};" onclick="copyRandom(event, this)">
                            <i class="fa-regular fa-copy"></i>
                        </button>
                        <div class="content-zone" onclick="openRandom()">
                            <div class="text-info">
                                <div class="card-title"><i class="fa-solid fa-bolt" style="color:${accent}; margin-right:5px;"></i> ${title}</div>
                                <div class="card-subtitle">Sistem Daftar Link Acak</div>
                            </div>
                        </div>
                        <div class="admin-actions" style="display:${isAdmin ? 'flex' : 'none'}; padding-right:12px;">
                            <button class="btn-act btn-edit" onclick="openModal('modal-random-form')"><i class="fa-solid fa-pen"></i></button>
                        </div>`;
                } else {
                    el.innerHTML = `
                        <div class="content-zone" style="justify-content:center; color:${accent}; font-weight:700;" onclick="openModal('modal-random-form')">
                            + SETUP KARTU LINK ACAK
                        </div>`;
                }
                container.appendChild(el);
            }

            // KARTU REGULER
            regs.forEach((d, index) => {
                const accent = colors[index % colors.length]; 
                const el = document.createElement('div');
                el.className = 'link-card';
                el.style.border = `2px solid ${d.pinnedAt ? 'var(--warning)' : accent}`;
                
                const title = d.title ? d.title.toUpperCase() : "UNTITLED";
                let badges = '';
                if(d.status) badges += `<span class="badge badge-status">${d.status.toUpperCase()}</span>`;
                if(d.price) badges += `<span class="badge badge-price">${d.price}</span>`;
                // Default subtitle jika tidak ada badge agar ukuran sama dengan kartu acak
                if(!badges) badges = `<span style="font-size:10px; opacity:0;">.</span>`;

                el.innerHTML = `
                    <button class="copy-zone" style="background: ${d.pinnedAt ? 'var(--warning)' : accent}; color: white; border-right: 2px solid ${d.pinnedAt ? 'var(--warning)' : accent};" onclick="copyText(event, '${d.url}', this)">
                        <i class="fa-regular fa-copy"></i>
                    </button>
                    <div class="content-zone" onclick="window.open('${d.url}', '_blank')">
                        <div class="text-info">
                            <div class="card-title">${title}</div>
                            <div class="card-subtitle">${badges}</div>
                        </div>
                    </div>
                    <div class="admin-actions" style="display:${isAdmin ? 'flex' : 'none'}; padding-right:12px;">
                        <button class="btn-act btn-pin ${d.pinnedAt ? 'active' : ''}" onclick="togglePin('${d.key}', ${!!d.pinnedAt})"><i class="fa-solid fa-thumbtack"></i></button>
                        <button class="btn-act btn-edit" onclick="editCard('${d.key}')"><i class="fa-solid fa-pen"></i></button>
                        <button class="btn-act btn-del" onclick="deleteCard('${d.key}')"><i class="fa-solid fa-trash"></i></button>
                    </div>`;
                container.appendChild(el);
            });
        }

        // ==========================================
        // FUNGSI KLIK & CRUD ADMIN
        // ==========================================
        function copyText(e, text, btn) {
            e.stopPropagation();
            navigator.clipboard.writeText(text).catch(()=>{});
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-check"></i>';
            setTimeout(() => { btn.innerHTML = originalHTML; }, 1000);
        }

        function copyRandom(e, btn) {
            e.stopPropagation();
            const data = dbShopee['ID_RANDOM_LOCKED'];
            if(!data || !data.url) return;
            const links = data.url.split('\n').map(l=>l.trim()).filter(l=>l.startsWith('http'));
            if(links.length > 0) copyText(e, links[Math.floor(Math.random() * links.length)], btn);
        }

        function openRandom() {
            const data = dbShopee['ID_RANDOM_LOCKED'];
            if(!data || !data.url) return customAlert("Info", "Belum ada link acak yang diatur.", "info");
            const links = data.url.split('\n').map(l=>l.trim()).filter(l=>l.startsWith('http'));
            if(links.length > 0) window.open(links[Math.floor(Math.random() * links.length)], '_blank');
        }

        function openModal(id) {
            document.getElementById(id).classList.add('active');
            if(id === 'modal-form') { 
                document.getElementById('form-key').value=''; 
                document.querySelectorAll('#modal-form .form-input').forEach(i=>i.value=''); 
                document.getElementById('form-title').innerText='Tambah Link'; 
            }
            if(id === 'modal-random-form') {
                const data = dbShopee['ID_RANDOM_LOCKED'] || {};
                document.getElementById('random-name').value = data.title || '';
                document.getElementById('random-url').value = data.url || '';
            }
        }
        
        function formatRupiah(el) {
            let angka = el.value.replace(/[^,\d]/g, '');
            el.value = angka ? 'Rp ' + angka.replace(/\B(?=(\d{3})+(?!\d))/g, ".") : '';
        }

        function saveCard() {
            const key = document.getElementById('form-key').value;
            const data = {
                title: document.getElementById('form-name').value,
                url: document.getElementById('form-url').value,
                price: document.getElementById('form-price').value,
                status: document.getElementById('form-status').value,
                updatedAt: Date.now()
            };
            if(!data.title || !data.url) return customAlert("Gagal", "Judul dan URL wajib diisi!", "danger");
            if(key) db.ref('linkshopee/'+key).update(data);
            else { data.createdAt = Date.now(); db.ref('linkshopee').push(data); }
            closeModal('modal-form');
        }

        function saveRandomCard() {
            db.ref('linkshopee/ID_RANDOM_LOCKED').set({
                title: document.getElementById('random-name').value,
                url: document.getElementById('random-url').value,
                updatedAt: Date.now()
            });
            closeModal('modal-random-form');
        }

        function editCard(key) {
            const data = dbShopee[key];
            if(!data) return;
            document.getElementById('form-key').value = key;
            document.getElementById('form-name').value = data.title || '';
            document.getElementById('form-url').value = data.url || '';
            document.getElementById('form-price').value = data.price || '';
            document.getElementById('form-status').value = data.status || '';
            document.getElementById('form-title').innerText = 'Edit Link';
            document.getElementById('modal-form').classList.add('active');
        }

        function togglePin(key, isPinned) { db.ref('linkshopee/'+key).update({ pinnedAt: isPinned ? null : Date.now() }); }

        async function deleteCard(key) { 
            const confirm = await customAlert("Hapus Kartu", "Yakin ingin menghapus link ini secara permanen?", "confirm");
            if(confirm) db.ref('linkshopee/'+key).remove(); 
        }

        // ==========================================
        // CUSTOM ALERT ELEGANT
        // ==========================================
        function customAlert(title, message, type) {
            return new Promise((resolve) => {
                const modal = document.getElementById('modal-alert');
                document.getElementById('alert-title').innerText = title;
                document.getElementById('alert-message').innerText = message;
                const btnBox = document.getElementById('alert-buttons');
                const icon = document.getElementById('alert-icon');

                modal.classList.add('active');

                if (type === 'confirm') {
                    icon.innerHTML = '<i class="fa-solid fa-circle-question" style="color: var(--primary);"></i>';
                    btnBox.innerHTML = `<button class="btn-alert btn-cancel" id="btn-cancel">Batal</button><button class="btn-alert btn-confirm" id="btn-confirm">Ya, Lanjut</button>`;
                    document.getElementById('btn-cancel').onclick = () => { modal.classList.remove('active'); resolve(false); };
                    document.getElementById('btn-confirm').onclick = () => { modal.classList.remove('active'); resolve(true); };
                } else if (type === 'danger') {
                    icon.innerHTML = '<i class="fa-solid fa-circle-exclamation" style="color: var(--danger);"></i>';
                    btnBox.innerHTML = `<button class="btn-alert btn-danger" id="btn-ok">Tutup</button>`;
                    document.getElementById('btn-ok').onclick = () => { modal.classList.remove('active'); resolve(true); };
                } else {
                    icon.innerHTML = '<i class="fa-solid fa-circle-info" style="color: var(--primary);"></i>';
                    btnBox.innerHTML = `<button class="btn-alert btn-confirm" id="btn-ok">Mengerti</button>`;
                    document.getElementById('btn-ok').onclick = () => { modal.classList.remove('active'); resolve(true); };
                }
            });
        }
    </script>
</body>
</html>
